<style>
body {
  font-family: 'Inter', sans-serif;
}

.font-heading {
  font-family: 'Poppins', sans-serif;
}

@keyframes gradient-shine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.animate-gradient-shine {
  background-size: 200% 200%;
  animation: gradient-shine 5s ease-in-out infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink-caret {
  from, to { border-color: transparent }
  50% { border-color: fuchsia; }
}

.animate-typing {
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
  border-right: .15em solid fuchsia;
  animation: 
    typing 2s steps(20, end),
    blink-caret .75s step-end infinite;
}

@keyframes fade-in-up {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-fade-in-up {
  animation: fade-in-up 0.6s ease-out forwards;
}

.card-3d-hover {
  transition: all 0.2s ease-out;
  transform-style: preserve-3d;
}
.card-3d-hover:hover {
  transform: perspective(1000px) rotateY(var(--rotate-y, 0)) rotateX(var(--rotate-x, 0)) scale3d(1.05, 1.05, 1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1), 0 6px 6px rgba(0,0,0,0.05);
}

@keyframes pulse-red {
  0%, 100% {
    opacity: 1;
    transform: scale(1);
  }
  50% {
    opacity: 0.8;
    transform: scale(1.1);
  }
}
.animate-pulse-red {
  animation: pulse-red 1.5s ease-in-out infinite;
  color: #ef4444; /* red-500 */
}


/* Custom PrismJS overrides to match the app's dark theme */
pre[class*="language-"] {
  background: #1e1e1e !important;
}

/* Hide scrollbar for horizontal swipe sections on Mobile */
.scrollbar-none::-webkit-scrollbar {
  display: none !important;
}
.scrollbar-none {
  -ms-overflow-style: none !important;  /* IE and Edge */
  scrollbar-width: none !important;  /* Firefox */
}
</style>

</head>
